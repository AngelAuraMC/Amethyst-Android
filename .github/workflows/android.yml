name: Android CI

on:
  pull_request:
    branches-ignore:
      - 'l10n_v3_openjdk' 
    types: [ opened, reopened ]
  push:
    branches-ignore:
      - 'l10n_v3_openjdk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GPLAY_KEYSTORE_PASSWORD: ${{ secrets.GPLAY_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get LTW
        run: |
          sudo apt update && sudo apt install -y wget
          mkdir -p app_pojavlauncher/libs
          cd app_pojavlauncher/libs
          wget https://github.com/Copper-launcher/LTW/releases/latest/download/ltw-release.aar

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          gradle-version: "8.11"

      - name: Run scripts
        run: |
          ./scripts/languagelist_updater.sh
          mkdir out

      - name: Build Release .apk
        run: |
          # Build the launcher
          gradle :app_pojavlauncher:assembleRelease
          mv app_pojavlauncher/build/outputs/apk/release/app_pojavlauncher-release.apk out/app-release.apk

      - name: Gen md5sums
        run: |
          md5sum out/app-release.apk > out/app-release.md5

      - name: Build Debug .apk
        run: |
          # Build the launcher
          gradle :app_pojavlauncher:assembleDebug
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk

      - name: Gen md5sums
        run: |
          md5sum out/app-debug.apk > out/app-debug.md5

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug (recommended)
          path: out/app-debug.*

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: out/app-release.*
